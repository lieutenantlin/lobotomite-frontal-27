AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Microplastics monitoring MVP on AWS serverless services.

Parameters:
  FrontendOrigin:
    Type: String
    Default: http://localhost:3000
  CognitoUserPoolId:
    Type: String
  CognitoUserPoolClientId:
    Type: String

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 512
    Environment:
      Variables:
        APP_RUNTIME: aws
        NODE_ENV: production
        STORAGE_PROVIDER: s3
        AWS_S3_BUCKET: !Ref SampleImagesBucket
        AWS_DDB_SAMPLES_TABLE: !Ref SamplesTable
        AWS_DDB_DEVICES_TABLE: !Ref DevicesTable
        AWS_DDB_USER_PROFILES_TABLE: !Ref UserProfilesTable
        AWS_DDB_AUDIT_LOGS_TABLE: !Ref AuditLogsTable
        AWS_DDB_DEVICE_CAPTURED_AT_INDEX: deviceId-capturedAt-index
        AWS_DDB_USER_CAPTURED_AT_INDEX: createdByUserId-capturedAt-index
        AWS_COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
        AWS_COGNITO_USER_POOL_CLIENT_ID: !Ref CognitoUserPoolClientId

Resources:
  SampleImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      VersioningConfiguration:
        Status: Enabled

  SamplesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sampleId
          AttributeType: S
        - AttributeName: deviceId
          AttributeType: S
        - AttributeName: capturedAt
          AttributeType: S
        - AttributeName: createdByUserId
          AttributeType: S
      KeySchema:
        - AttributeName: sampleId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: deviceId-capturedAt-index
          KeySchema:
            - AttributeName: deviceId
              KeyType: HASH
            - AttributeName: capturedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: createdByUserId-capturedAt-index
          KeySchema:
            - AttributeName: createdByUserId
              KeyType: HASH
            - AttributeName: capturedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  DevicesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: deviceId
          AttributeType: S
      KeySchema:
        - AttributeName: deviceId
          KeyType: HASH

  UserProfilesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: cognitoSub
          AttributeType: S
      KeySchema:
        - AttributeName: cognitoSub
          KeyType: HASH

  AuditLogsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - !Ref FrontendOrigin
        AllowHeaders:
          - authorization
          - content-type
        AllowMethods:
          - GET
          - POST
          - PATCH
          - DELETE
          - OPTIONS
      Auth:
        Authorizers:
          CognitoJwtAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPoolId}"
              audience:
                - !Ref CognitoUserPoolClientId
        DefaultAuthorizer: CognitoJwtAuthorizer

  ApiHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: dist/aws/handlers/api.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SamplesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref DevicesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UserProfilesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditLogsTable
        - S3CrudPolicy:
            BucketName: !Ref SampleImagesBucket
      Events:
        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /health
            Method: GET
            Auth:
              Authorizer: NONE
        AuthMe:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /auth/me
            Method: GET
        AuthLogin:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /auth/login
            Method: POST
            Auth:
              Authorizer: NONE
        AuthRegister:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /auth/register
            Method: POST
            Auth:
              Authorizer: NONE
        PresignUpload:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /uploads/presign
            Method: POST
        Samples:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /samples
            Method: ANY
        SamplesStats:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /samples/stats
            Method: GET
        SamplesMap:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /samples/map
            Method: GET
        SampleDetail:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /samples/{id}
            Method: ANY
        Devices:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /devices
            Method: GET
        DeviceDetail:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /devices/{id}
            Method: ANY
        DeviceSamples:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /devices/{id}/samples
            Method: GET
        StatsOverview:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /stats/overview
            Method: GET
        StatsTimeseries:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /stats/timeseries
            Method: GET
        AdminUsers:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/users
            Method: GET
        AdminUserDetail:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/users/{id}
            Method: PATCH
        AdminAuditLog:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/audit-log
            Method: GET
        AdminOverview:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/overview
            Method: GET

  IotIngestFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: dist/aws/handlers/iotIngest.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SamplesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref DevicesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditLogsTable

  DeviceSamplesTopicRule:
    Type: AWS::IoT::TopicRule
    Properties:
      RuleName: MicroplasticsDeviceSamples
      TopicRulePayload:
        AwsIotSqlVersion: "2016-03-23"
        Sql: "SELECT * FROM 'waterquality/devices/+/samples'"
        Actions:
          - Lambda:
              FunctionArn: !GetAtt IotIngestFunction.Arn

  AllowIotInvokeLambda:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref IotIngestFunction
      Principal: iot.amazonaws.com
      SourceArn: !Sub "arn:aws:iot:${AWS::Region}:${AWS::AccountId}:rule/MicroplasticsDeviceSamples"

Outputs:
  HttpApiUrl:
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  SampleImagesBucketName:
    Value: !Ref SampleImagesBucket
